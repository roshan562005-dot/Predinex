<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predinex Patent Drawings - Fixed</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
        }
        .page {
            width: 210mm;
            height: 297mm;
            padding: 25mm 25mm 25mm 25mm;
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
            margin: 0 auto;
            border: 1px dashed #ccc; /* Visual aid, hidden in print */
        }
        @media print {
            .page {
                border: none;
                margin: 0;
                width: auto;
                height: auto;
            }
        }
        .header {
            text-align: right;
            font-size: 10pt;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80%;
        }
        .footer {
            position: absolute;
            bottom: 25mm;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12pt;
            font-weight: bold;
        }
        svg {
            width: 100%;
            height: 100%;
            max-width: 650px;
            max-height: 750px;
        }
        rect, circle {
            fill: #ffffff;
            stroke: #000000;
            stroke-width: 2;
        }
        line, path {
            fill: none;
            stroke: #000000;
            stroke-width: 2;
        }
        text {
            fill: #000000;
            font-family: Arial, sans-serif;
            font-size: 11pt;
        }
        .centered-text {
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .header-text {
            text-anchor: start !important;
            font-weight: bold;
            font-size: 11pt;
            dominant-baseline: text-before-edge;
        }
        .title-text {
            font-family: "Times New Roman", Times, serif;
            font-size: 14pt;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- PAGE 1: SYSTEM BLOCK DIAGRAM -->
    <div class="page">
        <div class="header">SHEET 1 OF 2</div>
        
        <div class="canvas-container">
            <svg viewBox="0 0 600 700">
                <!-- User Box -->
                <rect x="200" y="50" width="200" height="60" rx="5" />
                <text x="300" y="80" class="centered-text" font-weight="bold">USER [100]</text>
                
                <!-- Client Application Box -->
                <rect x="150" y="190" width="300" height="90" rx="5" />
                <text x="300" y="220" class="centered-text" font-weight="bold">MOBILE / WEB CLIENT</text>
                <text x="300" y="240" class="centered-text">APPLICATION [110]</text>
                <text x="300" y="260" class="centered-text" font-size="9pt" font-style="italic">(3D Bio-Twin & Voice Meal UI)</text>
                
                <!-- Application Server Box -->
                <rect x="150" y="370" width="300" height="80" rx="5" />
                <text x="300" y="400" class="centered-text" font-weight="bold">APPLICATION SERVER [200]</text>
                <text x="300" y="420" class="centered-text" font-size="9pt" font-style="italic">(Next.js Server Actions)</text>

                <!-- SQLite DB Box -->
                <rect x="50" y="520" width="220" height="70" rx="5" />
                <text x="160" y="550" class="centered-text" font-weight="bold">BETTER-SQLITE3</text>
                <text x="160" y="570" class="centered-text">DATABASE [300]</text>

                <!-- Neural Core Box -->
                <rect x="330" y="520" width="220" height="70" rx="5" />
                <text x="440" y="550" class="centered-text" font-weight="bold">NEURAL CORE</text>
                <text x="440" y="570" class="centered-text">INTELLIGENCE ENG. [400]</text>

                <!-- Arrows -->
                <!-- User to Client -->
                <line x1="300" y1="110" x2="300" y2="190" />
                <path d="M 300,190 L 295,180 M 300,190 L 305,180" />
                <text x="300" y="150" class="centered-text" font-size="9pt" font-style="italic">Interaction</text>
                
                <!-- Client to Server -->
                <line x1="300" y1="280" x2="300" y2="370" />
                <path d="M 300,370 L 295,360 M 300,370 L 305,360" />
                <text x="300" y="325" class="centered-text" font-size="9pt" font-style="italic">API Requests</text>

                <!-- Server to DB -->
                <path d="M 250,450 L 160,520" />
                <path d="M 160,520 L 170,515 M 160,520 L 165,528" />
                <text x="185" y="480" class="centered-text" font-size="9pt" font-style="italic">SQL</text>

                <!-- Server to Neural Core -->
                <path d="M 350,450 L 440,520" />
                <path d="M 440,520 L 435,528 M 440,520 L 430,515" />
                <text x="415" y="480" class="centered-text" font-size="9pt" font-style="italic">Context</text>
            </svg>
        </div>
        
        <div class="footer">
            <span class="title-text">FIGURE 1: SYSTEM BLOCK DIAGRAM</span>
        </div>
    </div>

    <!-- PAGE 2: WORKFLOW DIAGRAM -->
    <div class="page">
        <div class="header">SHEET 2 OF 2</div>
        
        <div class="canvas-container">
            <svg viewBox="0 0 700 800">
                <!-- Phase 1 Boundary -->
                <rect x="20" y="30" width="660" height="160" rx="10" stroke-dasharray="5,5" fill="none" />
                <text x="40" y="45" class="header-text">PHASE 1: DIAGNOSTIC MAPPING</text>
                
                <!-- Phase 1 Boxes -->
                <rect x="40" y="80" width="165" height="60" rx="5" />
                <text x="122.5" y="110" class="centered-text" font-size="9.5pt">User Onboarding</text>
                
                <rect x="255" y="80" width="190" height="60" rx="5" />
                <text x="350" y="110" class="centered-text" font-size="9.5pt">Cinematic Assessment</text>
                
                <rect x="495" y="80" width="165" height="60" rx="5" />
                <text x="577.5" y="110" class="centered-text" font-size="9.5pt">Local SQLite DB Log</text>

                <!-- Phase 1 Arrows -->
                <line x1="205" y1="110" x2="255" y2="110" />
                <path d="M 255,110 L 247,106 M 255,110 L 247,114" />
                
                <line x1="445" y1="110" x2="495" y2="110" />
                <path d="M 495,110 L 487,106 M 495,110 L 487,114" />

                <!-- Link Phase 1 to Phase 2 -->
                <line x1="577.5" y1="140" x2="577.5" y2="210" />
                <line x1="577.5" y1="210" x2="350" y2="210" />
                <line x1="350" y1="210" x2="350" y2="230" />
                <path d="M 350,230 L 346,222 M 350,230 L 354,222" />

                <!-- Phase 2 Boundary -->
                <rect x="20" y="220" width="660" height="160" rx="10" stroke-dasharray="5,5" fill="none" />
                <text x="40" y="235" class="header-text">PHASE 2: INTELLIGENCE & TWIN GENERATION</text>
                
                <rect x="60" y="270" width="240" height="60" rx="5" />
                <text x="180" y="300" class="centered-text" font-size="9.5pt">Metabolic Risk Evaluation</text>
                
                <rect x="400" y="270" width="240" height="60" rx="5" />
                <text x="500" y="300" class="centered-text" font-size="9.5pt">3D Bio-Twin Dashboard</text>

                <line x1="300" y1="300" x2="400" y2="300" />
                <path d="M 400,300 L 392,296 M 400,300 L 392,304" />

                <!-- Link Phase 2 to Phase 3 -->
                <line x1="350" y1="330" x2="350" y2="385" />
                <line x1="350" y1="385" x2="350" y2="400" />
                <path d="M 350,400 L 346,392 M 350,400 L 354,392" />

                <!-- Phase 3 Boundary -->
                <rect x="20" y="390" width="660" height="170" rx="10" stroke-dasharray="5,5" fill="none" />
                <text x="40" y="405" class="header-text">PHASE 3: TARGETED INTERVENTIONS</text>
                
                <rect x="40" y="450" width="180" height="60" rx="5" />
                <text x="130" y="480" class="centered-text" font-size="9.5pt">Precision Nutrition</text>
                
                <rect x="260" y="450" width="180" height="60" rx="5" />
                <text x="350" y="480" class="centered-text" font-size="9.5pt">Dynamic Workouts</text>
                
                <rect x="480" y="450" width="180" height="60" rx="5" />
                <text x="570" y="480" class="centered-text" font-size="9.5pt">Zen Assist / Breath</text>

                <!-- Goal & Feedback -->
                <rect x="200" y="590" width="300" height="60" rx="5" />
                <text x="350" y="620" class="centered-text" font-weight="bold" font-size="10.5pt">GOAL: METABOLIC RISK REVERSED</text>

                <!-- Connect Phase 3 to Goal -->
                <line x1="130" y1="510" x2="130" y2="550" />
                <line x1="350" y1="510" x2="350" y2="590" />
                <path d="M 350,590 L 346,582 M 350,590 L 354,582" />
                <line x1="570" y1="510" x2="570" y2="550" />
                <line x1="130" y1="550" x2="570" y2="550" />
                
                <!-- Feedback loop line -->
                <path d="M 500,620 L 670,620 L 670,110 L 660,110" />
                <path d="M 660,110 L 668,106 M 660,110 L 668,114" />
                <text x="652" y="360" class="centered-text" font-size="8.5pt" font-style="italic" writing-mode="tb">Continuous Feedback Loop & Wearable Sync</text>
            </svg>
        </div>
        
        <div class="footer">
            <span class="title-text">FIGURE 2: PLATFORM WORKFLOW DIAGRAM</span>
        </div>
    </div>

</body>
</html>
